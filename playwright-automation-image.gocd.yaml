format_version: 10
pipelines:
  playwright-automation-image:
    group: automation-test-pipelines
    label_template: ${COUNT}
    lock_behavior: none
    display_order: -1
    materials:
      git-repo:
        git: https://github.com/pineafl-algo-dev/playwright-automation.git
        shallow_clone: false
        auto_update: true
        branch: master
    stages:
    - build-image:
        fetch_materials: true
        keep_artifacts: false
        clean_workspace: false
        approval:
          type: success
          allow_only_on_success: false
        jobs:
          deploy:
            timeout: 0
            tasks:
            - exec:
                arguments:
                - hello
                command: echo
                run_if: passed
